<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManhwaVault — Read Manhwa Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <!-- Header -->
    <header id="main-header">
        <div class="header-inner">
            <div class="logo" onclick="app.navigate('home')">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Manhwa<span class="logo-accent">Vault</span></span>
            </div>
            <div class="header-actions">
                <div class="agent-badge" title="Powered by MiMo V2.5">
                    <span class="agent-dot"></span> MiMo V2.5
                </div>
                <button class="icon-btn" id="search-toggle" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                </button>
                <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
        <div id="search-bar" class="search-bar hidden">
            <input type="text" id="search-input" placeholder="Search manhwa..." autocomplete="off">
            <button class="icon-btn" id="search-close" aria-label="Close search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app">
        <!-- Pages rendered by JS -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="home" aria-label="Home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </button>
        <button class="nav-btn" data-page="browse" aria-label="Browse">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Browse</span>
        </button>
        <button class="nav-btn" data-page="library" aria-label="Library">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>Library</span>
        </button>
    </nav>

    <!-- Reading View (hidden by default) -->
    <div id="reader-overlay" class="hidden">
        <div id="reader-toolbar">
            <button class="icon-btn" id="reader-back" aria-label="Back">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div id="reader-title" class="reader-title"></div>
            <div class="reader-toolbar-actions">
                <button class="icon-btn" id="reader-font-down" aria-label="Decrease font">A-</button>
                <button class="icon-btn" id="reader-font-up" aria-label="Increase font">A+</button>
                <button class="icon-btn" id="reader-theme" aria-label="Toggle theme">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
                </button>
            </div>
        </div>
        <div id="reader-progress-bar"><div id="reader-progress-fill"></div></div>
        <div id="reader-content"></div>
        <div id="reader-nav">
            <button class="reader-nav-btn" id="prev-chapter">← Previous Chapter</button>
            <button class="reader-nav-btn" id="next-chapter">Next Chapter →</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="canvas.js"></script>
    <script src="app.js"></script>
</body>
</html>
