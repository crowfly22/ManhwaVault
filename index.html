<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KomikHero — Baca Manga & Manhwa Online</title>
    <meta name="description" content="KomikHero - Platform baca manga dan manhwa terbaru dari MangaDex API. Gratis dan tanpa iklan.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="header__inner">
            <div class="header__logo" onclick="app.navigate('home')">
                <span class="logo-komik">Komik</span><span class="logo-hero">Hero</span>
            </div>
            <div class="header__actions">
                <button class="header__btn" id="searchToggle" aria-label="Cari">
                    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <button class="header__btn" id="themeToggle" aria-label="Ganti tema">
                    <svg class="icon-sun" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="icon-moon" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
        <!-- Search Bar (hidden by default) -->
        <div class="search-bar" id="searchBar">
            <input type="text" id="searchInput" placeholder="Cari manga, manhwa, manhua..." autocomplete="off">
            <button id="searchClose" aria-label="Tutup pencarian">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="app"></main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Beranda</span>
        </button>
        <button class="nav-item" data-page="browse">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <span>Jelajah</span>
        </button>
        <button class="nav-item" data-page="library">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <span>Koleksi</span>
        </button>
    </nav>

    <!-- Reader Overlay -->
    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-toolbar" id="readerToolbar">
            <button class="reader-back" id="readerBack">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="reader-info">
                <span class="reader-title" id="readerTitle"></span>
                <span class="reader-chapter" id="readerChapter"></span>
            </div>
            <div style="width:40px"></div>
        </div>
        <div class="reader-progress"><div class="reader-progress__bar" id="readerProgress"></div></div>
        <div class="reader-content" id="readerContent"></div>
        <div class="reader-nav" id="readerNav">
            <button class="reader-nav__btn" id="prevChapter">← Sebelumnya</button>
            <button class="reader-nav__btn" id="nextChapter">Selanjutnya →</button>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script src="komikhero.js?v=1.0"></script>
</body>
</html>
